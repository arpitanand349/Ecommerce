<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse quality organic items, electronics, books, and fashion products at SimpleStore.">
  <title>Simple E-Commerce Store - Home</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:,"> <!-- Prevent default favicon request -->
</head>
<body>

  <!-- Rendered by js/layout.js -->
  <header></header>

  <main class="main-content">
    
    <!-- Hero Banner -->
    <section class="hero">
      <div class="hero-body">
        <h1 class="hero-title">Discover Forest Fresh & Quality Goods</h1>
        <p class="hero-subtitle">Fresh produce, premium books, modern apparel, and high-quality electronics directly delivered to your doorstep.</p>
        <button class="hero-btn" onclick="document.getElementById('products-section').scrollIntoView({ behavior: 'smooth' })">Shop Catalog</button>
      </div>
    </section>

    <!-- Products Catalog Section -->
    <section id="products-section">
      
      <!-- Filter Bar -->
      <div class="filter-bar">
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" class="search-input" placeholder="Search products by title...">
        </div>
        <div class="categories-container" id="categories-container">
          <button class="category-chip active" data-category="All">All Categories</button>
          <!-- Loaded dynamically -->
        </div>
      </div>

      <!-- Loading State -->
      <div class="spinner-wrapper" id="loading-spinner">
        <div class="spinner"></div>
      </div>

      <!-- Products Grid -->
      <div class="products-grid" id="products-grid" style="display: none;">
        <!-- Loaded dynamically -->
      </div>

      <!-- Empty State -->
      <div id="empty-state" style="display: none; text-align: center; padding: 4rem 2rem;">
        <h3>No products found</h3>
        <p style="color: var(--text-muted); margin-top: 0.5rem;">Try adjusting your keywords or category filters.</p>
      </div>

    </section>

  </main>

  <!-- Rendered by js/layout.js -->
  <footer></footer>

  <!-- Scripts -->
  <script src="/js/toast.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/index.js"></script>
</body>
</html>
