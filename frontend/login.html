<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your SimpleStore account to manage your shopping cart and view order history.">
  <title>Simple E-Commerce Store - Login</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:,">
</head>
<body>

  <!-- Rendered by js/layout.js -->
  <header></header>

  <main class="main-content">
    <div class="auth-container">
      <div class="auth-header">
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Sign in to access your shopping cart and orders.</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="auth-btn" id="submit-btn">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register.html">Sign Up</a>
      </div>
    </div>
  </main>

  <!-- Rendered by js/layout.js -->
  <footer></footer>

  <!-- Scripts -->
  <script src="/js/toast.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
